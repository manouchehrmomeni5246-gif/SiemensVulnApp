name: Build APK from ZIP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Unzip project
        run: |
          unzip -q app/SiemensVulnApp.zip -d extracted

      - name: Fix JVM target
        run: |
          cd extracted/SiemensVulnApp
          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace 'com.manouchehr.siemensvulnapp'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.manouchehr.siemensvulnapp'
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName '1.0'
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          EOF

      - name: Fix Kotlin singleLine
        run: |
          cd extracted/SiemensVulnApp
          find . -name MainActivity.kt -exec sed -i 's/singleLine = true/maxLines = 1/g' {} \;

      - name: Build APK
        run: |
          cd extracted/SiemensVulnApp
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SiemensVulnApp-debug-apk
          path: extracted/SiemensVulnApp/app/build/outputs/apk/debug/app-debug.apk
